version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sectoolkit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sectoolkit_postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sectoolkit-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - CORS_ORIGINS=https://sectoolkit101.com
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - GREYNOISE_API_KEY=${GREYNOISE_API_KEY:-}
    volumes:
      - ./backend/app/data:/app/app/data
    networks:
      - internal
      - boltedge-network
    expose:
      - '5003'

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://sectoolkit101.com/api
    container_name: sectoolkit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - boltedge-network
    expose:
      - '3002'

volumes:
  sectoolkit_postgres_data:

networks:
  internal:
    driver: bridge
  boltedge-network:
    external: true
