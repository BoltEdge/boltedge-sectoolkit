<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" stroke="#f9731630" stroke-width="4"/>
  <!-- Subtle inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="none" stroke="#f9731615" stroke-width="2"/>
  <!-- Lightning bolt -->
  <path d="M 288 64 L 176 272 L 248 272 L 224 448 L 336 240 L 264 240 Z" 
        fill="url(#boltGrad)" filter="url(#glow)"/>
</svg>
